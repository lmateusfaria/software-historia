spring.application.name=biblioteca_digital_unifef-prod

# Configurações de Banco de Dados de Produção
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://192.168.100.105:5432/db_biblioteca_digital_unifef}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postdba}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false

# HikariCP Connection Pool (Similar ao PDV)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# Segurança
jwt.secret=${JWT_SECRET:7468576D5A7134743777217A25432A46294A404E635266556A586E3272357538125}
jwt.expiration=180000000

# Suporte a Proxy/Túnel (Reconhecimento de HTTPS)
server.forward-headers-strategy=native

# MinIO Config (Prod)
minio.url=${MINIO_URL:http://atb-minio:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password123}
minio.bucket-name=${MINIO_BUCKET_NAME:biblioteca-digital}

# Neo4j Config (Prod)
spring.neo4j.uri=${NEO4J_URI:bolt://atb-neo4j:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:password123}

# MultiPart Config (Uplod de Arquivos Grandes)
spring.servlet.multipart.max-file-size=600MB
spring.servlet.multipart.max-request-size=800MB

# Spring AI / OpenAI (Prod)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.1
