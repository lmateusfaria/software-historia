spring.application.name=biblioteca_digital_unifef-prod

# Configurações de Banco de Dados de Produção
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://192.168.100.105:5432/db_biblioteca_digital_unifef}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postdba}

# Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# HikariCP Connection Pool (Similar ao PDV)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# Segurança
jwt.secret=${JWT_SECRET:7468576D5A7134743777217A25432A46294A404E635266556A586E3272357538125}
jwt.expiration=180000000

# Suporte a Proxy/Túnel (Reconhecimento de HTTPS)
server.forward-headers-strategy=native
