# Nome da aplicação
spring.application.name=db_biblioteca_digital_unifef
spring.profiles.active=dev

# Configurações do servidor
server.port=8080

# Compression (Gzip) - Espelhado do PDV
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# Logs
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT Padrão (dev)
jwt.secret=7468576D5A7134743777217A25432A46294A404E635266556A586E3272357538125
jwt.expiration=180000000

# MinIO Config (Dev)
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=biblioteca-digital

# Neo4j Config (Dev)
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=neo4jpassword

# MultiPart Config (Uplod de Arquivos Grandes)
spring.servlet.multipart.max-file-size=600MB
spring.servlet.multipart.max-request-size=800MB

# Configurações de E-mail mock para Teste e Inicialização (Mailtrap placeholder)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=mock_user
spring.mail.password=mock_pass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
# Spring AI / OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.1
