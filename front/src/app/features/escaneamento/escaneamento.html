<div class="unifef-bg-container !pt-24 !pb-12 px-4 sm:px-6 lg:px-8">
    <!-- Background Elements -->
    <div class="unifef-blur-teal"></div>
    <div class="unifef-blur-orange"></div>

    <div class="max-w-3xl mx-auto relative z-10">
        <div class="glass card-premium p-8 fade-in">
            <div class="flex items-center mb-8">
                <div class="w-12 h-12 rounded-full bg-amber-500/20 flex items-center justify-center mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-neutral-100 tracking-tight">Nova Digitalização</h2>
                    <p class="text-gray-500 dark:text-neutral-400 text-sm">Escaneie documentos e jornais antigos para o acervo digital.</p>
                </div>
            </div>

            <form (ngSubmit)="onSubmit()" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Tipo de Documento -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Tipo de Documento</label>
                        <select [(ngModel)]="documento.tipo" name="tipo"
                            class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3">
                            <option value="Jornal">Jornal</option>
                            <option value="Revista">Revista</option>
                            <option value="Certidão">Certidão</option>
                            <option value="Carta">Carta</option>
                            <option value="Fotografia">Fotografia</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>

                    <!-- Local de Origem -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Local de Origem</label>
                        <input type="text" [(ngModel)]="documento.localOrigem" name="localOrigem"
                            class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3"
                            placeholder="Ex: São Paulo, SP">
                    </div>

                    <!-- Data do Documento -->
                    <div class="col-span-1 md:col-span-2 grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Dia</label>
                            <input type="number" [(ngModel)]="documento.diaDocumento" name="dia"
                                class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3"
                                placeholder="DD" min="1" max="31">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Mês</label>
                            <input type="number" [(ngModel)]="documento.mesDocumento" name="mes"
                                class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3"
                                placeholder="MM" min="1" max="12">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Ano</label>
                            <input type="number" [(ngModel)]="documento.anoDocumento" name="ano"
                                class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3"
                                placeholder="AAAA" min="1500" [max]="currentYear">
                        </div>
                    </div>

                    <!-- Edição / Marcadores -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Edição / Volume</label>
                        <input type="text" [(ngModel)]="documento.edicao" name="edicao"
                            class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3"
                            placeholder="Ex: Vol 2, Ed 45">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Créditos / Autoria</label>
                        <input type="text" [(ngModel)]="documento.marcadores" name="marcadores"
                            class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-3"
                            placeholder="Ex: Foto de João Silva">
                    </div>

                    <!-- Descrição -->
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium text-gray-600 dark:text-neutral-300 mb-2">Contexto / Descrição</label>
                        <textarea [(ngModel)]="documento.descricao" name="descricao" rows="4"
                            class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-lg p-4 text-base"
                            placeholder="Descreva detalhes importantes do documento..."></textarea>
                    </div>
                </div>

                <div
                    class="border-2 border-dashed border-neutral-800 rounded-xl p-8 text-center hover:border-amber-500/50 transition-colors focus-within:border-amber-500/50">
                    <input type="file" (change)="onFileSelected($event)" class="hidden" #fileInput multiple accept="image/*, application/pdf" capture="environment">
                    
                    <div (click)="fileInput.click()" class="cursor-pointer mb-6 active:scale-95 transition-transform touch-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 dark:text-neutral-600 mx-auto mb-4"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <p class="text-gray-700 dark:text-neutral-300 font-medium">Toque para tirar foto ou selecionar imagens</p>
                        <span class="text-xs text-gray-500 dark:text-neutral-500 mt-2 block">Dica: Use a câmera horizontal para melhores resultados</span>
                    </div>

                    <!-- Lista de Previews -->
                    <div *ngIf="selectedFiles.length > 0" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                        <div *ngFor="let preview of previews; let i = index" class="relative group aspect-square">
                            <img [src]="preview" class="w-full h-full object-cover rounded-lg border border-neutral-800 shadow-sm">
                            <button type="button" (click)="removeFile(i)" 
                                class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full p-1.5 shadow-lg active:scale-110 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-4 flex justify-end gap-4">
                    <button type="button"
                        class="px-6 py-2 text-neutral-400 hover:text-neutral-200 transition-colors">Cancelar</button>
                    <button type="submit" [disabled]="loading"
                        class="btn-premium px-8 py-3 bg-amber-600 hover:bg-amber-500 text-neutral-900 font-bold rounded-lg transition-all shadow-lg shadow-amber-900/20 disabled:opacity-50">
                        {{ loading ? 'Enviando...' : 'Enviar para Revisão' }}
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Progresso -->
    <app-modal 
        [isVisible]="isUploading" 
        [progress]="uploadProgress" 
        [error]="uploadError"
        (close)="isUploading = false; uploadError = null">
    </app-modal>
</div>
