<div class="min-h-screen pt-24 pb-12 px-4 sm:px-6 lg:px-8 bg-neutral-950">
    <div class="max-w-3xl mx-auto">
        <div class="glass card-premium p-8 fade-in">
            <div class="flex items-center mb-8">
                <div class="w-12 h-12 rounded-full bg-amber-500/20 flex items-center justify-center mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-neutral-100 tracking-tight">Nova Digitalização</h2>
                    <p class="text-neutral-400 text-sm">Escaneie documentos e jornais antigos para o acervo digital.</p>
                </div>
            </div>

            <form (ngSubmit)="onSubmit()" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-neutral-300 mb-2">Título do Documento</label>
                    <input type="text" [(ngModel)]="documento.titulo" name="titulo"
                        class="input-premium w-full bg-neutral-900 border-neutral-800 text-neutral-100 rounded-lg p-3"
                        placeholder="Ex: Jornal A Noite - Edição 123">
                </div>

                <div>
                    <label class="block text-sm font-medium text-neutral-300 mb-2">Descrição / Contexto</label>
                    <textarea [(ngModel)]="documento.descricao" name="descricao" rows="4"
                        class="input-premium w-full bg-neutral-900 border-neutral-800 text-neutral-100 rounded-lg p-3"
                        placeholder="Descreva detalhes como data original, autor ou estado de conservação..."></textarea>
                </div>

                <div
                    class="border-2 border-dashed border-neutral-800 rounded-xl p-8 text-center hover:border-amber-500/50 transition-colors">
                    <input type="file" (change)="onFileSelected($event)" class="hidden" #fileInput multiple accept="image/*">
                    
                    <div (click)="fileInput.click()" class="cursor-pointer mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-neutral-600 mx-auto mb-4"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="text-neutral-400">Clique para selecionar ou arraste as imagens do documento</p>
                        <span class="text-xs text-neutral-500 mt-2 block">Você pode selecionar várias páginas/fotos de uma vez</span>
                    </div>

                    <!-- Lista de Previews -->
                    <div *ngIf="selectedFiles.length > 0" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                        <div *ngFor="let preview of previews; let i = index" class="relative group">
                            <img [src]="preview" class="w-full h-32 object-cover rounded-lg border border-neutral-800">
                            <button type="button" (click)="removeFile(i)" 
                                class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-4 flex justify-end gap-4">
                    <button type="button"
                        class="px-6 py-2 text-neutral-400 hover:text-neutral-200 transition-colors">Cancelar</button>
                    <button type="submit" [disabled]="loading"
                        class="btn-premium px-8 py-3 bg-amber-600 hover:bg-amber-500 text-neutral-900 font-bold rounded-lg transition-all shadow-lg shadow-amber-900/20 disabled:opacity-50">
                        {{ loading ? 'Enviando...' : 'Enviar para Revisão' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
