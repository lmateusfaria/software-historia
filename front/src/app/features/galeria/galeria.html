<div class="min-h-screen pt-24 pb-12 px-4 sm:px-6 lg:px-8 bg-[#fdfaf6] dark:bg-[#0f1115] text-[#2c2c2c] dark:text-[#e0e0e0] transition-colors duration-300 font-sans relative overflow-hidden">
    <!-- Background Elements -->
    <div class="absolute top-0 right-0 w-1/2 h-1/2 bg-primary/5 rounded-full blur-[150px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-1/2 h-1/2 bg-primary/5 rounded-full blur-[150px] pointer-events-none"></div>

    <div class="max-w-7xl mx-auto relative z-10">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
            <div class="fade-in">
                <h1 class="text-4xl font-bold text-gray-900 dark:text-neutral-100 tracking-tight mb-2">Acervo Histórico</h1>
                <p class="text-gray-500 dark:text-neutral-400">Explore documentos, jornais e registros preservados da nossa história.</p>
            </div>

            <div class="w-full md:w-96 fade-in" style="animation-delay: 0.1s">
                <div class="relative">
                    <input type="text" [(ngModel)]="filtro"
                        class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-xl p-4 pr-12"
                        placeholder="Pesquisar no acervo...">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div *ngFor="let doc of documentosFiltrados; let i = index"
                class="glass card-premium rounded-2xl overflow-hidden fade-in group cursor-pointer"
                [style.animation-delay]="(i * 0.05) + 's'">

                <div class="aspect-[3/4] overflow-hidden relative">
                    <img [src]="doc.urlImagem" [alt]="doc.tipo || 'Visualização do documento'"
                        class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-neutral-950 via-transparent to-transparent opacity-60">
                    </div>

                    <div class="absolute top-4 left-4">
                        <span
                            class="px-3 py-1 bg-amber-500/20 text-amber-500 text-xs font-bold rounded-full border border-amber-500/30 backdrop-blur-sm">
                            {{ doc.status }}
                        </span>
                    </div>
                </div>

                <div class="p-6">
                    <h3
                        class="text-lg font-bold text-gray-900 dark:text-neutral-100 mb-2 line-clamp-1 group-hover:text-amber-500 transition-colors">
                        {{ doc.tipo || 'Documento' }}
                    </h3>
                    <p class="text-gray-600 dark:text-neutral-400 text-sm line-clamp-3 mb-4">
                        {{ doc.descricao }}
                    </p>
                    <div
                        class="flex items-center justify-between pt-4 border-t border-neutral-800 text-xs text-neutral-500">
                        <span>{{ doc.dataDigitalizacao | date:'dd/MM/yyyy' }}</span>
                        <span class="flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            {{ doc.usuarioNome }}
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div *ngIf="documentosFiltrados.length === 0 && !loading" class="text-center py-24 fade-in">
            <div class="w-20 h-20 bg-neutral-900 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-neutral-700" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 dark:text-neutral-300">Nenhum documento encontrado</h3>
            <p class="text-gray-500 dark:text-neutral-500">Tente ajustar seus termos de pesquisa.</p>
        </div>
    </div>
</div>
