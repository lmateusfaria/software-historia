<div class="unifef-bg-container !pt-24 !pb-12 px-4 sm:px-6 lg:px-8">
    <!-- Background Elements -->
    <div class="unifef-blur-teal"></div>
    <div class="unifef-blur-orange"></div>

    <div class="max-w-7xl mx-auto relative z-10">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
            <div class="fade-in">
                <h1 class="text-4xl font-bold text-gray-900 dark:text-neutral-100 tracking-tight mb-2">Acervo Histórico</h1>
                <p class="text-gray-500 dark:text-neutral-400">Explore documentos, jornais e registros preservados da nossa história.</p>
            </div>

            <div class="w-full md:w-96 fade-in" style="animation-delay: 0.1s">
                <div class="relative">
                    <input type="text" [(ngModel)]="filtro"
                        class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-xl p-4 pr-12 shadow-sm"
                        placeholder="Pesquisar por descrição ou conteúdo...">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Advanced Filters -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-12 fade-in" style="animation-delay: 0.15s">
            <div class="relative">
                <select [(ngModel)]="filtroTipo" 
                    class="input-premium w-full appearance-none bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-xl p-4 pr-10 shadow-sm">
                    <option value="">Todos os Tipos</option>
                    <option *ngFor="let tipo of tiposDisponiveis" [value]="tipo">{{ tipo }}</option>
                </select>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
            </div>

            <div class="relative">
                <select [(ngModel)]="filtroAno" 
                    class="input-premium w-full appearance-none bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-xl p-4 pr-10 shadow-sm">
                    <option value="">Todos os Anos</option>
                    <option *ngFor="let ano of anosDisponiveis" [value]="ano">{{ ano }}</option>
                </select>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
            </div>

            <div class="relative">
                <input type="text" [(ngModel)]="filtroLocal"
                    class="input-premium w-full bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-800 text-gray-900 dark:text-neutral-100 rounded-xl p-4 shadow-sm"
                    placeholder="Filtrar por Local (Ex: São Paulo)">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <app-document-card *ngFor="let doc of documentosFiltrados; let i = index"
                [document]="doc"
                [index]="i"
                (clickCard)="verDetalhes($event)">
            </app-document-card>
        </div>

        <!-- Empty State -->
        <div *ngIf="documentosFiltrados.length === 0 && !loading" class="text-center py-24 fade-in">
            <div class="w-20 h-20 bg-neutral-900 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-neutral-700" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 dark:text-neutral-300">Nenhum documento encontrado</h3>
            <p class="text-gray-500 dark:text-neutral-500">Tente ajustar seus termos de pesquisa.</p>
        </div>
    </div>
</div>
