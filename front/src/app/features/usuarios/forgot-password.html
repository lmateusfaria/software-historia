<div class="unifef-bg-container flex items-center justify-center">
  
  <!-- Background Elements -->
  <div class="unifef-blur-teal"></div>
  <div class="unifef-blur-orange"></div>

  <div class="w-full max-w-sm relative z-10 fade-in px-4">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-white mb-2">Recuperar Senha</h2>
        <p class="text-white/70 text-sm">Digite seu e-mail para receber um link de redefinição.</p>
      </div>

      <form (ngSubmit)="onSubmit()" autocomplete="off" class="space-y-6">
        
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-white/70" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
          </div>
          <input 
            class="w-full bg-white/20 border border-white/5 backdrop-blur-md text-white placeholder-white/80 text-center py-4 rounded-md focus:outline-none focus:ring-2 focus:ring-white/30 transition-all font-medium" 
            type="email" 
            placeholder="Seu E-mail" 
            [(ngModel)]="email" 
            name="email" 
            [disabled]="loading || success"
            required>
        </div>

        @if (error) {
          <div class="p-3 bg-red-900/50 border border-red-500/30 rounded-md text-red-200 text-sm text-center backdrop-blur-sm mt-4">
            {{ error }}
          </div>
        }

        @if (success) {
          <div class="p-3 bg-teal-900/60 border border-teal-500/30 rounded-md text-teal-100 text-sm text-center backdrop-blur-sm mt-4">
            Em instantes você receberá um link no seu e-mail para redefinir a senha.
          </div>
        }

        <div class="pt-2">
          <button 
            class="w-full bg-unifef-teal hover:bg-unifef-teal-dark text-white py-3 rounded-md font-medium transition-colors shadow-lg shadow-black/20" 
            type="submit" 
            [disabled]="loading || success">
            {{ loading ? 'ENVIANDO...' : 'ENVIAR LINK' }}
          </button>
        </div>

        <div class="mt-6 text-center">
          <button 
            class="text-white/60 text-sm hover:text-white transition-colors" 
            type="button" 
            (click)="router.navigate(['/login'])">
            Voltar para o Login
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
