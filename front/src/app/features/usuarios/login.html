<div class="min-h-screen flex items-center justify-center bg-[#fdfaf6] dark:bg-[#0f1115] relative overflow-hidden p-6 font-sans">
  <!-- Background Decorations -->
  <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
  </div>

  <div class="w-full max-w-md relative z-10 fade-in">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary text-white rounded-2xl shadow-xl mb-4 rotate-3">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">Bem-vindo</h1>
      <p class="text-gray-500 dark:text-gray-400">Acesse a Biblioteca Digital Histórica</p>
    </div>

    <div class="card-premium">
      <form (ngSubmit)="onSubmit()" autocomplete="off" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">E-mail</label>
          <input class="input-premium" type="email" placeholder="nome@exemplo.com" [(ngModel)]="login" name="login" required>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Senha</label>
          <input class="input-premium" type="password" placeholder="••••••••" [(ngModel)]="password" name="password" required>
        </div>

        @if (error) {
          <div class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-red-600 dark:text-red-400 text-sm text-center">
            {{ error }}
          </div>
        }

        <button class="btn-premium bg-primary text-white hover:bg-gray-900" type="submit" [disabled]="loading">
          {{ loading ? 'Iniciando sessão...' : 'Entrar' }}
        </button>

        <div class="relative flex items-center justify-center py-2">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
          </div>
          <span class="relative px-4 text-xs text-gray-400 dark:text-gray-600 bg-transparent uppercase tracking-widest">ou</span>
        </div>

        <button class="w-full py-3 text-gray-600 dark:text-gray-400 font-medium hover:text-primary dark:hover:text-white transition-colors" type="button" (click)="router.navigate(['/register'])">
          Criar uma nova conta
        </button>
      </form>
    </div>
  </div>
</div>
