<div class="min-h-screen flex items-center justify-center relative overflow-hidden font-sans"
  style="background: linear-gradient(135deg, #4c294b 0%, #2b2238 40%, #0d5462 100%);">
  
  <!-- Fundo custom de Aurora/Gradient Blur extra simulando a imagem -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#bd5d8f] rounded-full blur-[150px] opacity-20"></div>
    <div class="absolute top-[20%] right-[-20%] w-[60%] h-[60%] bg-[#088395] rounded-full blur-[180px] opacity-30"></div>
  </div>

  <div class="w-full max-w-sm relative z-10 fade-in px-4">
    <!-- Formulário Glassmorphism -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
      <form (ngSubmit)="onSubmit()" autocomplete="off" class="space-y-6">
        
        <!-- Input E-mail / Username -->
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <!-- User Icon -->
            <svg class="w-5 h-5 text-white/70" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
            </svg>
          </div>
          <input 
            class="w-full bg-white/20 border border-white/5 backdrop-blur-md text-white placeholder-white/80 text-center py-4 rounded-md focus:outline-none focus:ring-2 focus:ring-white/30 transition-all font-medium" 
            type="email" 
            placeholder="E-mail ou Usuário" 
            [(ngModel)]="login" 
            name="login" 
            required>
        </div>
        
        <!-- Input Senha -->
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <!-- Lock Icon -->
            <svg class="w-5 h-5 text-white/70" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </div>
          <input 
            class="w-full bg-white/20 border border-white/5 backdrop-blur-md text-white placeholder-white/80 text-center py-4 rounded-md focus:outline-none focus:ring-2 focus:ring-white/30 transition-all font-medium" 
            type="password" 
            placeholder="Senha" 
            [(ngModel)]="password" 
            name="password" 
            required>
        </div>

        <div class="flex flex-row items-center justify-start w-full text-white/90 text-sm px-1 py-1">
          <label class="flex items-center gap-2 cursor-pointer group hover:text-white transition-colors">
            <input type="checkbox" class="w-4 h-4 rounded border-white/30 bg-white/10 text-teal-500 focus:ring-2 focus:ring-teal-500/50 focus:ring-offset-0 transition-all cursor-pointer">
            <span class="select-none">Manter conectado</span>
          </label>
        </div>

        @if (error) {
          <div class="p-3 bg-red-900/50 border border-red-500/30 rounded-md text-red-200 text-sm text-center backdrop-blur-sm mt-4">
            {{ error }}
          </div>
        }

        <div class="flex flex-row items-center justify-between pt-4 gap-4">
          <button 
            class="flex-1 bg-[#1b3d4d] hover:bg-[#15313f] text-white py-3 px-6 rounded-md font-medium transition-colors shadow-lg shadow-black/20" 
            type="submit" 
            [disabled]="loading">
            {{ loading ? 'ENTRANDO...' : 'ENTRAR' }}
          </button>
          
          <a href="#" class="flex-1 text-center text-sm font-medium hover:text-white text-white/80 hover:underline transition-all cursor-pointer" (click)="$event.preventDefault()">Esqueceu a senha?</a>
        </div>

        <!-- Botão para tela de registro -->
        <div class="mt-6 text-center">
          <button 
            class="text-white/60 text-sm hover:text-white transition-colors" 
            type="button" 
            (click)="router.navigate(['/register'])">
            Não tem uma conta? Cadastre-se
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
