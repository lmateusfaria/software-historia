<div class="unifef-bg-container flex items-center justify-center">
  
  <!-- Background Elements -->
  <div class="unifef-blur-teal"></div>
  <div class="unifef-blur-orange"></div>

  <div class="w-full max-w-sm relative z-10 fade-in px-4">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-white mb-2">Nova Senha</h2>
        <p class="text-white/70 text-sm">Crie uma nova senha segura para sua conta.</p>
      </div>

      <form (ngSubmit)="onSubmit()" autocomplete="off" class="space-y-6">
        
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-white/70" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </div>
          <input 
            class="w-full bg-white/20 border border-white/5 backdrop-blur-md text-white placeholder-white/80 text-center py-4 rounded-md focus:outline-none focus:ring-2 focus:ring-white/30 transition-all font-medium" 
            type="password" 
            placeholder="Nova Senha" 
            [(ngModel)]="newPassword" 
            name="newPassword" 
            [disabled]="loading || success || !token"
            required>
        </div>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-white/70" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
          </div>
          <input 
            class="w-full bg-white/20 border border-white/5 backdrop-blur-md text-white placeholder-white/80 text-center py-4 rounded-md focus:outline-none focus:ring-2 focus:ring-white/30 transition-all font-medium" 
            type="password" 
            placeholder="Confirmar Senha" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword" 
            [disabled]="loading || success || !token"
            required>
        </div>

        @if (error) {
          <div class="p-3 bg-red-900/50 border border-red-500/30 rounded-md text-red-200 text-sm text-center backdrop-blur-sm mt-4">
            {{ error }}
          </div>
        }

        @if (success) {
          <div class="p-3 bg-green-900/50 border border-green-500/30 rounded-md text-green-200 text-sm text-center backdrop-blur-sm mt-4">
            Senha redefinida com sucesso! Redirecionando para o login...
          </div>
        }

        <div class="pt-2">
          <button 
            class="w-full bg-unifef-teal hover:bg-unifef-teal-dark text-white py-3 rounded-md font-medium transition-colors shadow-lg shadow-black/20" 
            type="submit" 
            [disabled]="loading || success || !token">
            {{ loading ? 'SALVANDO...' : 'REDEFINIR SENHA' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
